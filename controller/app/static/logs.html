<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MNM - Logs</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .log-entry { padding: 4px 12px; border-bottom: 1px solid var(--border); font-size: 0.82rem; font-family: var(--font-sans); }
    .log-entry.DEBUG { color: var(--text-muted); }
    .log-entry.INFO { color: var(--text); }
    .log-entry.WARNING { color: var(--yellow); }
    .log-entry.ERROR { color: var(--red); }
    .log-ts { color: var(--text-muted); margin-right: 8px; }
    .log-level { display: inline-block; width: 55px; font-weight: 600; }
    .log-module { display: inline-block; width: 100px; color: var(--accent); margin-right: 8px; }
    .log-event { color: var(--text-muted); margin-right: 8px; }
    .log-ctx { color: var(--text-muted); font-size: 0.78rem; margin-left: 170px; }
    #log-container { max-height: calc(100vh - 220px); overflow-y: auto; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); }
    .log-controls { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
    .log-controls select, .log-controls input { padding: 6px 10px; font-size: 0.85rem; }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo"><span>MNM</span> Controller</a>
    <nav>
      <a href="/">Dashboard</a>
      <span class="nav-separator"></span>
      <span class="nav-group-label">Intelligence</span>
      <a href="/nodes">Nodes</a>
      <a href="/endpoints">Endpoints</a>
      <a href="/events">Events</a>
      <span class="nav-separator"></span>
      <span class="nav-group-label">Operations</span>
      <a href="/discover">Discovery</a>
      <a href="/jobs">Jobs</a>
      <a href="/logs" class="active">Logs</a>
      <span class="nav-separator"></span>
      <div class="theme-switcher">
        <button data-theme="light" title="Light">Light</button>
        <button data-theme="dark" title="Dark" class="active">Dark</button>
        <button data-theme="system" title="System">Auto</button>
      </div>
      <a href="/search" id="search-nav-btn" title="Search">&#128269;</a>
      <a href="#" id="prefs-btn" title="Preferences">&#9881;</a>
      <a id="logout-link" href="#">Logout</a>
    </nav>
  </header>

  <div class="container">
    <div class="card">
      <h2>System Logs</h2>
      <div class="log-controls">
        <select id="filter-level">
          <option value="">All Levels</option>
          <option value="DEBUG">DEBUG</option>
          <option value="INFO">INFO</option>
          <option value="WARNING">WARNING</option>
          <option value="ERROR">ERROR</option>
        </select>
        <select id="filter-module">
          <option value="">All Modules</option>
          <option value="controller">Controller</option>
          <option value="discovery">Discovery</option>
          <option value="collector">Collector</option>
          <option value="nautobot">Nautobot</option>
          <option value="docker">Docker</option>
          <option value="config">Config</option>
        </select>
        <input type="number" id="filter-limit" value="200" min="10" max="1000" style="width: 80px;" title="Max entries">
        <button id="refresh-btn" class="btn small">Refresh</button>
        <button id="export-btn" class="btn small" title="Download full log buffer + system info as JSON for issue reports">Export Logs</button>
        <label style="margin: 0; display: flex; align-items: center; gap: 4px;">
          <input type="checkbox" id="auto-scroll" checked> Auto-scroll
        </label>
        <label style="margin: 0; display: flex; align-items: center; gap: 4px;">
          <input type="checkbox" id="auto-refresh" checked> Auto-refresh (5s)
        </label>
      </div>
      <div id="log-container"></div>
    </div>
  </div>

  <script src="/static/js/preferences.js"></script>
  <script>
    async function checkAuth() {
      const resp = await fetch('/api/auth/check');
      const data = await resp.json();
      if (!data.authenticated) window.location.href = '/login';
    }

    function escHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    async function loadLogs() {
      const level = document.getElementById('filter-level').value;
      const module = document.getElementById('filter-module').value;
      const limit = document.getElementById('filter-limit').value || 200;

      let url = `/api/logs?limit=${limit}`;
      if (level) url += `&level=${level}`;
      if (module) url += `&module=${module}`;

      try {
        const resp = await fetch(url);
        if (resp.status === 401) { window.location.href = '/login'; return; }
        const data = await resp.json();
        const container = document.getElementById('log-container');
        const autoScroll = document.getElementById('auto-scroll').checked;

        // Entries come newest-first from API, reverse for display
        const entries = (data.entries || []).reverse();

        container.innerHTML = entries.map(e => {
          const ts = (e.timestamp || '').substring(11, 19);
          const ctx = e.context && Object.keys(e.context).length > 0
            ? '<div class="log-ctx">' + Object.entries(e.context).map(
                ([k,v]) => `${escHtml(k)}=${escHtml(typeof v === 'object' ? JSON.stringify(v) : String(v))}`
              ).join(' ') + '</div>'
            : '';
          return `<div class="log-entry ${e.level || ''}">` +
            `<span class="log-ts">${escHtml(ts)}</span>` +
            `<span class="log-level">${escHtml(e.level || '')}</span>` +
            `<span class="log-module">${escHtml(e.module || '')}</span>` +
            `<span class="log-event">${escHtml(e.event || '')}</span>` +
            `${escHtml(e.message || '')}` +
            ctx + '</div>';
        }).join('');

        if (autoScroll) {
          container.scrollTop = container.scrollHeight;
        }
      } catch (e) {
        console.error('Failed to load logs:', e);
      }
    }

    // Theme
    const saved = localStorage.getItem('mnm-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    MNMPreferences.init();

    // Event listeners
    document.getElementById('refresh-btn').addEventListener('click', loadLogs);
    document.getElementById('export-btn').addEventListener('click', () => {
      // Trigger download via the same auth cookie the page already has.
      window.location.href = '/api/logs/export';
    });
    document.getElementById('filter-level').addEventListener('change', loadLogs);
    document.getElementById('filter-module').addEventListener('change', loadLogs);

    document.getElementById('logout-link').addEventListener('click', async (e) => {
      e.preventDefault();
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login';
    });

    let logRefreshTimer = null;
    document.getElementById('auto-refresh').addEventListener('change', (e) => {
      if (e.target.checked) {
        logRefreshTimer = setInterval(loadLogs, 5000);
      } else {
        if (logRefreshTimer) { clearInterval(logRefreshTimer); logRefreshTimer = null; }
      }
    });

    // Init
    checkAuth().then(() => {
      loadLogs();
      logRefreshTimer = setInterval(loadLogs, 5000);
    });
  </script>
</body>
</html>
