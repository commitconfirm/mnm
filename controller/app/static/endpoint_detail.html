<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MNM - Endpoint Detail</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header>
    <a href="/" class="logo"><span>MNM</span> Controller</a>
    <nav>
      <a href="/">Dashboard</a>
      <span class="nav-separator"></span>
      <span class="nav-group-label">Intelligence</span>
      <a href="/investigate">Investigations</a>
      <a href="/nodes">Nodes</a>
      <a href="/endpoints" class="active">Endpoints</a>
      <a href="/events">Events</a>
      <span class="nav-separator"></span>
      <span class="nav-group-label">Operations</span>
      <a href="/discover">Discovery</a>
      <a href="/jobs">Jobs</a>
      <a href="/logs">Logs</a>
      <span class="nav-separator"></span>
      <div class="theme-switcher">
        <button data-theme="light">Light</button>
        <button data-theme="dark" class="active">Dark</button>
        <button data-theme="system">Auto</button>
      </div>
      <a href="#" id="prefs-btn" title="Preferences">&#9881;</a>
      <a id="logout-link" href="#">Logout</a>
    </nav>
  </header>

  <div class="container">
    <div class="card">
      <h2 id="ep-title">Endpoint</h2>
      <div id="ep-meta" class="grid-3"><div class="loading-indicator" style="grid-column:1/-1">Loading endpoint data...</div></div>
    </div>

    <div class="card">
      <h2>Timeline</h2>
      <div id="ep-timeline">Loading...</div>
    </div>

    <div class="card">
      <h2>Raw Events</h2>
      <table>
        <thead><tr><th>Timestamp</th><th>Type</th><th>Old</th><th>New</th></tr></thead>
        <tbody id="ep-events"></tbody>
      </table>
    </div>

    <!-- Comments: operator notebook -->
    <div class="card">
      <h2>Comments <span id="comment-count" style="font-size:0.8rem;font-weight:normal;color:var(--text-muted)"></span></h2>
      <div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:12px">
        <textarea id="comment-input" rows="2" placeholder="Add a note about this endpoint..." style="flex:1;padding:8px 12px;font-size:0.9rem;resize:vertical;min-height:40px"></textarea>
        <button id="comment-submit" class="btn primary small" style="align-self:stretch">Add</button>
      </div>
      <div id="comment-list"></div>
    </div>

    <!-- Change History: field-level audit trail -->
    <div class="card">
      <h2>
        <button id="history-toggle" type="button" style="background:none;border:none;color:var(--text-muted);font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;padding:0;font-family:var(--font-sans)">
          &#9658; Change History <span id="history-count"></span>
        </button>
      </h2>
      <div id="history-container" style="display:none">
        <div id="history-dt"></div>
      </div>
    </div>
  </div>

  <script src="/static/js/datatable.js"></script>
  <script src="/static/js/icons.js"></script>
  <script src="/static/js/preferences.js"></script>
  <script src="/static/js/endpoint_detail.js"></script>
</body>
</html>
