---
# MNM - Modular Network Monitor
# Phase 1: Nautobot + PostgreSQL + Redis + Celery
# Phase 2: Traefik + Prometheus + SNMP Exporter + gnmic + Grafana

services:

  # ---------------------------------------------------------------------------
  # Reverse Proxy
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v2.11
    container_name: mnm-traefik
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DOCKER_API_VERSION: "1.40"
    volumes:
      - ./config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - mnm-network

  # ---------------------------------------------------------------------------
  # Data Layer
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    container_name: mnm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nautobot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-nautobot}
    volumes:
      - mnm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nautobot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mnm-network

  redis:
    image: redis:7-alpine
    container_name: mnm-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - mnm_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mnm-network

  # ---------------------------------------------------------------------------
  # Nautobot
  # ---------------------------------------------------------------------------
  nautobot:
    build:
      context: ./nautobot
      dockerfile: Dockerfile
    image: mnm-nautobot:latest
    container_name: mnm-nautobot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8443:8080"
    environment:
      NAUTOBOT_DB_HOST: postgres
      NAUTOBOT_DB_PORT: "5432"
      NAUTOBOT_DB_NAME: ${POSTGRES_DB:-nautobot}
      NAUTOBOT_DB_USER: ${POSTGRES_USER:-nautobot}
      NAUTOBOT_DB_PASSWORD: ${POSTGRES_PASSWORD}
      NAUTOBOT_REDIS_HOST: redis
      NAUTOBOT_REDIS_PORT: "6379"
      NAUTOBOT_REDIS_PASSWORD: ${REDIS_PASSWORD}
      NAUTOBOT_SECRET_KEY: ${NAUTOBOT_SECRET_KEY}
      NAUTOBOT_ALLOWED_HOSTS: ${NAUTOBOT_ALLOWED_HOSTS:-*}
      NAUTOBOT_NAPALM_USERNAME: ${NAUTOBOT_NAPALM_USERNAME:-}
      NAUTOBOT_NAPALM_PASSWORD: ${NAUTOBOT_NAPALM_PASSWORD:-}
      NAUTOBOT_NAPALM_TIMEOUT: ${NAUTOBOT_NAPALM_TIMEOUT:-30}
      NAPALM_USERNAME: ${NAUTOBOT_NAPALM_USERNAME:-}
      NAPALM_PASSWORD: ${NAUTOBOT_NAPALM_PASSWORD:-}
      NAUTOBOT_CONFIG: /opt/nautobot/nautobot_config.py
    volumes:
      - mnm_nautobot_media:/opt/nautobot/media
      - mnm_nautobot_static:/opt/nautobot/static
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 300s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nautobot.rule=PathPrefix(`/`)"
      - "traefik.http.routers.nautobot.priority=1"
      - "traefik.http.services.nautobot.loadbalancer.server.port=8080"
    networks:
      - mnm-network

  nautobot-worker:
    image: mnm-nautobot:latest
    container_name: mnm-nautobot-worker
    restart: unless-stopped
    depends_on:
      nautobot:
        condition: service_healthy
    command: nautobot-server celery worker -l INFO
    environment:
      NAUTOBOT_DB_HOST: postgres
      NAUTOBOT_DB_PORT: "5432"
      NAUTOBOT_DB_NAME: ${POSTGRES_DB:-nautobot}
      NAUTOBOT_DB_USER: ${POSTGRES_USER:-nautobot}
      NAUTOBOT_DB_PASSWORD: ${POSTGRES_PASSWORD}
      NAUTOBOT_REDIS_HOST: redis
      NAUTOBOT_REDIS_PORT: "6379"
      NAUTOBOT_REDIS_PASSWORD: ${REDIS_PASSWORD}
      NAUTOBOT_SECRET_KEY: ${NAUTOBOT_SECRET_KEY}
      NAUTOBOT_ALLOWED_HOSTS: ${NAUTOBOT_ALLOWED_HOSTS:-*}
      NAUTOBOT_NAPALM_USERNAME: ${NAUTOBOT_NAPALM_USERNAME:-}
      NAUTOBOT_NAPALM_PASSWORD: ${NAUTOBOT_NAPALM_PASSWORD:-}
      NAUTOBOT_NAPALM_TIMEOUT: ${NAUTOBOT_NAPALM_TIMEOUT:-30}
      NAPALM_USERNAME: ${NAUTOBOT_NAPALM_USERNAME:-}
      NAPALM_PASSWORD: ${NAUTOBOT_NAPALM_PASSWORD:-}
      NAUTOBOT_CONFIG: /opt/nautobot/nautobot_config.py
    volumes:
      - mnm_nautobot_media:/opt/nautobot/media
      - mnm_nautobot_static:/opt/nautobot/static
    healthcheck:
      test: ["CMD-SHELL", "nautobot-server celery inspect ping -d celery@$$HOSTNAME 2>/dev/null | grep -q OK"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 300s
    networks:
      - mnm-network

  nautobot-scheduler:
    image: mnm-nautobot:latest
    container_name: mnm-nautobot-scheduler
    restart: unless-stopped
    depends_on:
      nautobot:
        condition: service_healthy
    command: nautobot-server celery beat -l INFO
    environment:
      NAUTOBOT_DB_HOST: postgres
      NAUTOBOT_DB_PORT: "5432"
      NAUTOBOT_DB_NAME: ${POSTGRES_DB:-nautobot}
      NAUTOBOT_DB_USER: ${POSTGRES_USER:-nautobot}
      NAUTOBOT_DB_PASSWORD: ${POSTGRES_PASSWORD}
      NAUTOBOT_REDIS_HOST: redis
      NAUTOBOT_REDIS_PORT: "6379"
      NAUTOBOT_REDIS_PASSWORD: ${REDIS_PASSWORD}
      NAUTOBOT_SECRET_KEY: ${NAUTOBOT_SECRET_KEY}
      NAUTOBOT_ALLOWED_HOSTS: ${NAUTOBOT_ALLOWED_HOSTS:-*}
      NAUTOBOT_NAPALM_USERNAME: ${NAUTOBOT_NAPALM_USERNAME:-}
      NAUTOBOT_NAPALM_PASSWORD: ${NAUTOBOT_NAPALM_PASSWORD:-}
      NAUTOBOT_NAPALM_TIMEOUT: ${NAUTOBOT_NAPALM_TIMEOUT:-30}
      NAPALM_USERNAME: ${NAUTOBOT_NAPALM_USERNAME:-}
      NAPALM_PASSWORD: ${NAUTOBOT_NAPALM_PASSWORD:-}
      NAUTOBOT_CONFIG: /opt/nautobot/nautobot_config.py
    volumes:
      - mnm_nautobot_media:/opt/nautobot/media
      - mnm_nautobot_static:/opt/nautobot/static
    healthcheck:
      test: ["CMD-SHELL", "test -f /proc/1/cmdline && cat /proc/1/cmdline | tr '\\0' ' ' | grep -q 'celery beat'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 300s
    networks:
      - mnm-network

  # ---------------------------------------------------------------------------
  # Monitoring + Telemetry (Phase 2)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: mnm-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_DAYS:-365}d"
      - "--storage.tsdb.retention.size=10GB"
      - "--web.external-url=/prometheus/"
      - "--web.route-prefix=/prometheus/"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - mnm_prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/prometheus/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=PathPrefix(`/prometheus`)"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
    networks:
      - mnm-network

  snmp-exporter:
    image: prom/snmp-exporter:v0.29.0
    container_name: mnm-snmp-exporter
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9116"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - mnm-network

  gnmic:
    image: ghcr.io/openconfig/gnmic:latest
    container_name: mnm-gnmic
    restart: unless-stopped
    volumes:
      - ./config/gnmic/gnmic.yml:/app/gnmic.yml:ro
    command: subscribe --config /app/gnmic.yml
    environment:
      GNMI_USERNAME: ${GNMI_USERNAME:-}
      GNMI_PASSWORD: ${GNMI_PASSWORD:-}
    networks:
      - mnm-network

  grafana:
    image: grafana/grafana-oss:12.0.1
    container_name: mnm-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-mnm-admin}
      GF_SERVER_ROOT_URL: "http://localhost:8080/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/device-dashboard.json
    volumes:
      - mnm_grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=PathPrefix(`/grafana`)"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    networks:
      - mnm-network

  # ---------------------------------------------------------------------------
  # Controller (Phase 2.5)
  # ---------------------------------------------------------------------------
  controller:
    build:
      context: ./controller
      dockerfile: Dockerfile
    image: mnm-controller:latest
    container_name: mnm-controller
    restart: unless-stopped
    depends_on:
      nautobot:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "9090:9090"
    environment:
      MNM_ADMIN_USER: ${MNM_ADMIN_USER:-mnm-admin}
      MNM_ADMIN_PASSWORD: ${MNM_ADMIN_PASSWORD}
      NAUTOBOT_URL: http://nautobot:8080
      NAUTOBOT_SECRET_KEY: ${NAUTOBOT_SECRET_KEY}
      MNM_DB_HOST: postgres
      MNM_DB_PORT: "5432"
      MNM_DB_NAME: ${MNM_CONTROLLER_DB:-mnm_controller}
      MNM_DB_USER: ${POSTGRES_USER:-nautobot}
      MNM_DB_PASSWORD: ${POSTGRES_PASSWORD}
      PROXMOX_HOST: ${PROXMOX_HOST:-}
      PROXMOX_TOKEN_ID: ${PROXMOX_TOKEN_ID:-}
      PROXMOX_TOKEN_SECRET: ${PROXMOX_TOKEN_SECRET:-}
      PROXMOX_VERIFY_SSL: ${PROXMOX_VERIFY_SSL:-false}
      PROXMOX_INTERVAL_SECONDS: ${PROXMOX_INTERVAL_SECONDS:-300}
      ANOMALY_STALE_DAYS: ${ANOMALY_STALE_DAYS:-7}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - mnm_controller_data:/data
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:9090/api/health\")'"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - mnm-network

volumes:
  mnm_postgres_data:
  mnm_redis_data:
  mnm_nautobot_media:
  mnm_nautobot_static:
  mnm_prometheus_data:
  mnm_grafana_data:
  mnm_controller_data:

networks:
  mnm-network:
    name: mnm-network
    driver: bridge
